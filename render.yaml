services:
  - type: web
    name: schoollibrary
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate_schemas --shared --noinput && python manage.py migrate_schemas --tenant --noinput
    startCommand: gunicorn --bind 0.0.0.0:10000 --env DJANGO_SETTINGS_MODULE=schoollibrary.settings schoollibrary.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoollibrary_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: schoollibrary.settings

    healthCheckPath: /healthz/

databases:
  - name: schoollibrary_db
    plan: free
