services:
  - type: web
    name: schoollibrary
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn schoollibrary.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoollibrary_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: schoollibrary_db
    plan: free