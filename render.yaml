services:
  - type: web
    name: schoollibrary
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn schoollibrary.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoollibrary_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: schoollibrary_db
    plan: free