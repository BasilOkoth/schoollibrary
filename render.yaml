services:
  - type: web
    name: schoollibrary
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn schoollibrary.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: schoollibrary_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PUBLIC_SCHEMA_NAME
        value: public
      - key: CORS_ALLOWED_ORIGINS
        value: https://*.onrender.com,https://*.render.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com,https://*.render.com
      - key: PYTHON_VERSION
        value: 3.11.0
    # Health check endpoint
    healthCheckPath: /healthz/

databases:
  - name: schoollibrary_db
    plan: free
    version: 15
    # PostgreSQL extensions for django-tenants
    postgresExtensions:
      - pg_stat_statements