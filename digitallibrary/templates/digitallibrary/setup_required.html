<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-gray-800/50 backdrop-blur-sm rounded-2xl p-8 max-w-md text-center border border-gray-700">
            <div class="text-6xl mb-4">🏗️</div>
            <h1 class="text-2xl font-bold text-white mb-2">System Setup in Progress</h1>
            <p class="text-gray-400 mb-6">
                {{ message|default:"The school system is being initialized. Please wait a moment." }}
            </p>
            <div class="animate-pulse">
                <div class="h-1 bg-green-500 rounded-full w-32 mx-auto"></div>
            </div>
            
            {% if user.is_superuser and error %}
            <details class="mt-6 text-left">
                <summary class="text-xs text-gray-500 cursor-pointer">Technical Details</summary>
                <pre class="text-xs text-red-400 mt-2 overflow-auto">{{ error|truncatechars:500 }}</pre>
            </details>
            {% endif %}
            
            <p class="text-xs text-gray-500 mt-6">
                <a href="/admin/" class="text-green-400 hover:text-green-300">Go to Admin Panel</a> to set up your school.
            </p>
        </div>
    </div>
    
    <script>
        // Auto-refresh every 5 seconds to check if setup is complete
        setTimeout(function() {
            location.reload();
        }, 5000);
    </script>
</body>
</html>
