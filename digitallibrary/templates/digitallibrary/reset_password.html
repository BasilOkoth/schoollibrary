{% extends 'digitallibrary/base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
        <h1 class="text-xl font-bold text-white mb-4">Reset Password</h1>
        <p class="text-gray-300 mb-4">Reset password for: <strong>{{ user.get_full_name|default:user.username }}</strong></p>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm text-gray-300 mb-2">New Password</label>
                <input type="text" name="new_password" required 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white">
                <p class="text-xs text-gray-400 mt-1">Minimum 6 characters</p>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                    Reset Password
                </button>
                <a href="{% url 'digitallibrary:user_management' %}" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
