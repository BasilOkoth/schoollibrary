{% extends 'digitallibrary/base.html' %}

{% block title %}Edit {{ tenant.name }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="mb-8">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-white">Edit School</h1>
                <p class="text-gray-400 mt-2">Update school information for {{ tenant.name }}</p>
            </div>
            <a href="/tenants/secure-admin/tenant/{{ tenant.id }}/" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">
                ← Back to Details
            </a>
        </div>
    </div>

    <div class="bg-gray-800 rounded-xl p-6 shadow-xl max-w-2xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">School Name</label>
                <input type="text" name="name" value="{{ tenant.name }}" required
                       class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input type="email" name="email" value="{{ tenant.email|default:'' }}"
                       class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Phone Number</label>
                <input type="text" name="phone_number" value="{{ tenant.phone_number|default:'' }}"
                       class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Address</label>
                <textarea name="address" rows="3" class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">{{ tenant.address|default:'' }}</textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Motto</label>
                <input type="text" name="motto" value="{{ tenant.motto|default:'' }}"
                       class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Principal Name</label>
                <input type="text" name="principal_name" value="{{ tenant.principal_name|default:'' }}"
                       class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-green-500 text-white">
            </div>
            
            <div class="flex items-center gap-4">
                <label class="flex items-center gap-2 text-gray-300">
                    <input type="checkbox" name="is_active" {% if tenant.is_active %}checked{% endif %}> Active
                </label>
                <label class="flex items-center gap-2 text-gray-300">
                    <input type="checkbox" name="on_trial" {% if tenant.on_trial %}checked{% endif %}> On Trial
                </label>
            </div>
            
            <div class="pt-4 flex gap-3">
                <button type="submit" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition">
                    Save Changes
                </button>
                <a href="/tenants/secure-admin/tenant/{{ tenant.id }}/" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-lg transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
