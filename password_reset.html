{% extends "digitallibrary/base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-lg w-full max-w-md">
    <h2 class="text-white text-2xl font-bold mb-6">Reset Password</h2>
    <form method="post">
      {% csrf_token %}
      <label class="block text-gray-300 text-sm mb-1">Email address</label>
      {{ form.email }}
      <button type="submit" class="mt-4 w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Send Reset Link</button>
    </form>
    <a href="/login/" class="block mt-4 text-center text-green-400 hover:underline">Back to login</a>
  </div>
</div>
{% endblock %}
