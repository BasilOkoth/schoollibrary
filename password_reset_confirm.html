{% extends "digitallibrary/base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-lg w-full max-w-md">
    <h2 class="text-white text-2xl font-bold mb-6">Set New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="mt-4 w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Set Password</button>
    </form>
  </div>
</div>
{% endblock %}
